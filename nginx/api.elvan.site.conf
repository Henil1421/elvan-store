# ─── api.elvan.site — Express.js backend ─────────────────────────────────────
#
# Copy to:  /etc/nginx/sites-available/api.elvan.site
# Enable:   sudo ln -s /etc/nginx/sites-available/api.elvan.site \
#                      /etc/nginx/sites-enabled/api.elvan.site
#           sudo nginx -t && sudo systemctl reload nginx
#
# After obtaining a certificate with:
#   sudo certbot --nginx -d api.elvan.site
# Certbot will automatically add the ssl_certificate directives below.

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name api.elvan.site;

    # ACME challenge (used by Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.elvan.site$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name api.elvan.site;

    # --- SSL (filled in by Certbot) ---
    # ssl_certificate     /etc/letsencrypt/live/api.elvan.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.elvan.site/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate-limiting (protect the API from abuse) ───────────────────────────
    # The 'api' zone is defined in /etc/nginx/conf.d/elvan-shared.conf
    # (installed by scripts/deploy.sh)
    limit_req zone=api burst=20 nodelay;

    # ── Proxy to Express.js on port 4000 ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive / connection reuse
        proxy_set_header   Connection "";
        keepalive_timeout  65;

        # Reasonable timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer tuning
        proxy_buffer_size       4k;
        proxy_buffers           8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      application/json text/plain;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api.elvan.site-access.log;
    error_log  /var/log/nginx/api.elvan.site-error.log;
}
