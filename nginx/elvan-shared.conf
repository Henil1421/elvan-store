# ─── Elvan — shared Nginx snippets ───────────────────────────────────────────
#
# Copy to:  /etc/nginx/conf.d/elvan-shared.conf
# Then run: sudo nginx -t && sudo systemctl reload nginx
#
# This file must be included BEFORE the virtual-host configs that reference
# the 'api' rate-limit zone.

# Rate-limit zone for the backend API:
# 10 MB shared memory → tracks ~160 000 unique IPs
# 60 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
