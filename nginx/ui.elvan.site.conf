# ─── ui.elvan.site — React/Vite frontend ─────────────────────────────────────
#
# Copy to:  /etc/nginx/sites-available/ui.elvan.site
# Enable:   sudo ln -s /etc/nginx/sites-available/ui.elvan.site \
#                      /etc/nginx/sites-enabled/ui.elvan.site
#           sudo nginx -t && sudo systemctl reload nginx
#
# After obtaining a certificate with:
#   sudo certbot --nginx -d ui.elvan.site
# Certbot will automatically add the ssl_certificate directives below.

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name ui.elvan.site;

    # ACME challenge (used by Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ui.elvan.site$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name ui.elvan.site;

    # --- SSL (filled in by Certbot) ---
    # ssl_certificate     /etc/letsencrypt/live/ui.elvan.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ui.elvan.site/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Serve the Vite production build ─────────────────────────────────────
    root  /var/www/elvan-frontend/dist;
    index index.html;

    # React Router — every path falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets generated by Vite
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/ui.elvan.site-access.log;
    error_log  /var/log/nginx/ui.elvan.site-error.log;
}
